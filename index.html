        let currentGenreFilter = 'All';
        let currentSearchKeyword = '';

        function getGenreIcon(genre) {
            if (genre === 'Rock') return '🎸';
            if (genre === 'Pop') return '🎵';
            if (genre === 'Alternative/Indie') return '🎸';
            if (genre === 'Electronic') return '⚡';
            return '🎵';
        }

        function updateStats(songs) {
            const statsDiv = document.getElementById('songStats');
            const rockCount = songs.filter(s => s.genre === 'Rock').length;
            const popCount = songs.filter(s => s.genre === 'Pop').length;
            const altCount = songs.filter(s => s.genre === 'Alternative/Indie').length;
            const electroCount = songs.filter(s => s.genre === 'Electronic').length;
            statsDiv.innerHTML = `🎵 ${songs.length} Lagu • 🎸 Rock (${rockCount}) • 🎵 Pop (${popCount}) • 🎸 Alt/Indie (${altCount}) • ⚡ Electronic (${electroCount})`;
        }

        function renderGenreFilters() {
            const genres = {};
            songsData.forEach(song => {
                genres[song.genre] = (genres[song.genre] || 0) + 1;
            });
            
            const genreList = ['All', ...Object.keys(genres).sort()];
            const filterContainer = document.getElementById('genreFilters');
            
            filterContainer.innerHTML = genreList.map(genre => {
                const count = genre === 'All' ? songsData.length : genres[genre];
                const isActive = currentGenreFilter === genre;
                const genreIcon = genre === 'All' ? '🎵' : getGenreIcon(genre);
                return `<button class="genre-btn ${isActive ? 'active' : ''}" data-genre="${genre}">${genreIcon} ${genre} (${count})</button>`;
            }).join('');
            
            document.querySelectorAll('.genre-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const genre = btn.getAttribute('data-genre');
                    currentGenreFilter = genre;
                    renderGenreFilters();
                    applyFilters();
                });
            });
        }

        function getFilteredSongs() {
            let filtered = [...songsData];
            
            if (currentGenreFilter !== 'All') {
                filtered = filtered.filter(song => song.genre === currentGenreFilter);
            }
            
            if (currentSearchKeyword.trim()) {
                const keyword = currentSearchKeyword.toLowerCase();
                filtered = filtered.filter(song => 
                    song.title.toLowerCase().includes(keyword) || 
                    song.artist.toLowerCase().includes(keyword)
                );
            }
            
            return filtered;
        }

        function renderSongs() {
            const filteredSongs = getFilteredSongs();
            const container = document.getElementById('songsContainer');
            
            if (filteredSongs.length === 0) {
                container.innerHTML = '<div class="no-result">🎵 Lagu tidak ditemukan. Coba kata kunci atau genre lain!</div>';
                updateStats(filteredSongs);
                return;
            }

            let html = '';
            for (let i = 0; i < filteredSongs.length; i++) {
                const song = filteredSongs[i];
                const safeTitle = escapeHtml(song.title);
                const safeArtist = escapeHtml(song.artist);
                const safeGenre = escapeHtml(song.genre);
                
                let previewLyrics = escapeHtml(song.lyrics);
                if (previewLyrics.length > 150) {
                    previewLyrics = previewLyrics.substring(0, 150) + '...';
                }
                previewLyrics = previewLyrics.replace(/\n/g, '<br>');
                
                const genreIcon = getGenreIcon(safeGenre);
                const originalIndex = songsData.findIndex(s => s.title === song.title && s.artist === song.artist);
                
                html += `
                    <div class="song-card">
                        <div class="song-title">${safeTitle}</div>
                        <div class="song-artist">
                            <span class="artist-icon">🎤</span> ${safeArtist}
                        </div>
                        <div class="song-genre">${genreIcon} ${safeGenre}</div>
                        <div class="lyrics-preview" data-original-index="${originalIndex}">
                            ${previewLyrics}
                        </div>
                        <div class="links">
                            <a href="${song.spotifyLink}" target="_blank" rel="noopener noreferrer" class="btn btn-spotify">
                                🎧 Spotify
                            </a>
                            <a href="${song.preReleaseLink}" target="_blank" rel="noopener noreferrer" class="btn btn-prarilis">
                                🔗 Prarilis
                            </a>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;

            document.querySelectorAll('.lyrics-preview').forEach(el => {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const originalIdx = parseInt(this.getAttribute('data-original-index'));
                    if (!isNaN(originalIdx) && songsData[originalIdx]) {
                        openLyricsModal(originalIdx);
                    }
                });
            });
            
            updateStats(filteredSongs);
        }

        function openLyricsModal(songIndex) {
            const song = songsData[songIndex];
            if (!song) return;

            document.getElementById('modalTitle').innerText = song.title;
            document.getElementById('modalArtist').innerText = song.artist;
            const genreIcon = getGenreIcon(song.genre);
            document.getElementById('modalGenre').innerHTML = `${genreIcon} Genre: ${escapeHtml(song.genre)}`;
            
            const lyricsHtml = escapeHtml(song.lyrics).replace(/\n/g, '<br>');
            document.getElementById('modalLyrics').innerHTML = lyricsHtml;

            modalLinksDiv.innerHTML = `
                <a href="${song.spotifyLink}" target="_blank" rel="noopener noreferrer" class="btn btn-spotify">🎧 Buka Spotify</a>
                <a href="${song.preReleaseLink}" target="_blank" rel="noopener noreferrer" class="btn btn-prarilis">🔗 Buka Prarilis</a>
            `;
            
            const modal = document.getElementById('lyricsModal');
            modal.style.display = 'flex';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function applyFilters() {
            renderSongs();
        }

        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', function(e) {
            currentSearchKeyword = e.target.value;
            applyFilters();
        });

        const modal = document.getElementById('lyricsModal');
        const closeBtn = document.getElementById('closeModalBtn');
        
        function closeModal() {
            modal.style.display = 'none';
        }
        
        closeBtn.addEventListener('click', closeModal);
        window.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeModal();
            }
        });
        
        renderGenreFilters();
        renderSongs();
    </script>
</body>
</html>
